<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAPTCHA Training System</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        margin-top: 40px;
    }
    canvas {
        border: 1px solid #ccc;
        margin: 20px;
    }
    input {
        padding: 8px;
        font-size: 16px;
    }
    button {
        padding: 8px 16px;
        margin: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>CAPTCHA Recognition Training</h2>

<canvas id="captchaCanvas" width="220" height="80"></canvas>

<br>

<input type="text" id="userInput" placeholder="Enter text">
<br>

<button onclick="checkAnswer()">Submit</button>
<button onclick="generateCaptcha()">Next</button>

<p id="result"></p>

<br>

<label>Difficulty:</label>
<input type="range" id="difficulty" min="1" max="5" value="2">

<script>
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
let currentText = "";

// Generate random text
function generateText(length = 5) {
    let text = "";
    for (let i = 0; i < length; i++) {
        text += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return text;
}

// Draw CAPTCHA
function generateCaptcha() {
    const canvas = document.getElementById("captchaCanvas");
    const ctx = canvas.getContext("2d");
    const difficulty = document.getElementById("difficulty").value;

    currentText = generateText();

    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background
    ctx.fillStyle = "#f5f5f5";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw text with distortion
    let x = 20;

    for (let i = 0; i < currentText.length; i++) {
        const char = currentText[i];

        ctx.save();

        // Random font
        const fontSize = 30 + Math.random() * 10;
        ctx.font = fontSize + "px Arial";

        // Random rotation (difficulty scaled)
        const angle = (Math.random() - 0.5) * difficulty * 0.5;
        ctx.translate(x, 50);
        ctx.rotate(angle);

        ctx.fillStyle = randomColor(0, 150);
        ctx.fillText(char, 0, 0);

        ctx.restore();

        x += 30;
    }

    // Add noise lines
    for (let i = 0; i < difficulty * 2; i++) {
        ctx.strokeStyle = randomColor(0, 200);
        ctx.beginPath();
        ctx.moveTo(rand(0, 220), rand(0, 80));
        ctx.lineTo(rand(0, 220), rand(0, 80));
        ctx.stroke();
    }

    // Add dots noise
    for (let i = 0; i < difficulty * 100; i++) {
        ctx.fillStyle = randomColor(0, 255);
        ctx.fillRect(rand(0, 220), rand(0, 80), 1, 1);
    }
}

// Random helpers
function rand(min, max) {
    return Math.floor(Math.random() * (max - min) + min);
}

function randomColor(min, max) {
    return `rgb(${rand(min,max)},${rand(min,max)},${rand(min,max)})`;
}

// Check answer
function checkAnswer() {
    const userInput = document.getElementById("userInput").value;
    const result = document.getElementById("result");

    if (userInput === currentText) {
        result.innerHTML = "✅ Correct";
        result.style.color = "green";
    } else {
        result.innerHTML = `❌ Incorrect (Answer: ${currentText})`;
        result.style.color = "red";
    }
}

// Initialize
generateCaptcha();
</script>

</body>
</html>
