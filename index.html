<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Handwritten CAPTCHA Training</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Indie+Flower&family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 40px;
    }
    canvas {
        border: 1px solid #ccc;
        margin: 20px;
    }
    input, select {
        padding: 8px;
        font-size: 16px;
    }
    button {
        padding: 8px 16px;
        margin: 5px;
        cursor: pointer;
    }
    #trainingSection, #analyticsSection {
        display: none;
    }
    #analyticsSection ul {
        list-style-type: none;
        padding-left: 0;
    }
</style>
</head>
<body>

<h2>Handwritten CAPTCHA Training (Case-Insensitive)</h2>

<!-- User Name Input -->
<div id="userSection">
  <form id="userForm">
    <input type="text" id="userName" placeholder="Enter your name" autocomplete="off">
    <button type="submit">Start Training</button>
  </form>
</div>

<!-- Training Section -->
<div id="trainingSection">
  <canvas id="captchaCanvas" width="260" height="100"></canvas>
  <br>
  <form id="captchaForm">
    <input type="text" id="userInput" placeholder="Enter CAPTCHA text" autocomplete="off">
    <button type="submit">Submit</button>
  </form>
  <button onclick="generateCaptcha()">Next</button>
  <p id="result"></p>
  <br>
  <label>Difficulty:</label>
  <select id="difficulty">
    <option value="1">Easy</option>
    <option value="3">Intermediate</option>
    <option value="5">Hard</option>
  </select>
</div>

<script>
// Handle Enter key for user name
document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault(); // prevent page reload
    startTraining();
});

// Handle Enter key for CAPTCHA input
document.getElementById("captchaForm").addEventListener("submit", function(e) {
    e.preventDefault(); // prevent page reload
    checkAnswer();
});
</script>

<!-- Analytics Section -->
<div id="analyticsSection">
  <h3>Training Analytics</h3>
  <p id="analytics"></p>
  <h4>Review Incorrect Answers:</h4>
  <ul id="incorrectList"></ul>
</div>

<script>
const fonts = ["Indie Flower", "Patrick Hand", "Caveat"];
const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // Removed 0,O,I,l,1

let currentText = "";
let userName = "";
let trials = 0;
let correctCount = 0;
const maxTrials = 20;
// Store objects with user input and correct answer
let incorrectAnswers = [];

// Generate random CAPTCHA text
function generateText(length = 5) {
    let text = "";
    for (let i = 0; i < length; i++) {
        text += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return text;
}

// Draw CAPTCHA
function generateCaptcha() {
    const canvas = document.getElementById("captchaCanvas");
    const ctx = canvas.getContext("2d");
    const difficulty = parseInt(document.getElementById("difficulty").value);

    currentText = generateText();

    document.getElementById("userInput").value = "";
    document.getElementById("result").innerHTML = "";

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let x = 20;
    for (let i = 0; i < currentText.length; i++) {
        const char = currentText[i];
        const fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
        const fontSize = 30 + Math.random() * 15;
        ctx.font = `${fontSize}px "${fontFamily}"`;

        const angle = (Math.random() - 0.5) * difficulty * 0.6;
        const y = 50 + (Math.random() - 0.5) * 10;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillStyle = `rgb(${Math.random()*100+50},${Math.random()*100+50},${Math.random()*100+50})`;
        ctx.fillText(char, 0, 0);
        ctx.restore();
        x += fontSize * 0.9;
    }

    for (let i = 0; i < difficulty * 2; i++) {
        ctx.strokeStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.7)`;
        ctx.beginPath();
        ctx.moveTo(Math.random()*260, Math.random()*100);
        ctx.lineTo(Math.random()*260, Math.random()*100);
        ctx.stroke();
    }
}

// Check user answer
function checkAnswer() {
    const userInput = document.getElementById("userInput").value.toUpperCase().trim();
    const result = document.getElementById("result");

    if (!userInput) return;

    trials++;
    if (userInput === currentText) {
        result.innerHTML = "✅ Correct";
        result.style.color = "green";
        correctCount++;
    } else {
        result.innerHTML = `❌ Incorrect (Answer: ${currentText})`;
        result.style.color = "red";
        incorrectAnswers.push({userInput: userInput, correctAnswer: currentText});
    }

    if (trials >= maxTrials) {
        showAnalytics();
    } else {
        setTimeout(generateCaptcha, 500);
    }
}

// Start training
function startTraining() {
    const nameInput = document.getElementById("userName").value.trim();
    if (!nameInput) {
        alert("Please enter your name to start.");
        return;
    }
    userName = nameInput;
    document.getElementById("userSection").style.display = "none";
    document.getElementById("trainingSection").style.display = "block";
    generateCaptcha();
}

// Show analytics with incorrect answers
function showAnalytics() {
    document.getElementById("trainingSection").style.display = "none";

    const accuracy = ((correctCount / trials) * 100).toFixed(1);
    document.getElementById("analytics").innerHTML = `
        User: ${userName}<br>
        Total Trials: ${trials}<br>
        Correct: ${correctCount}<br>
        Incorrect: ${trials - correctCount}<br>
        Accuracy: ${accuracy}%
    `;

    const ul = document.getElementById("incorrectList");
    ul.innerHTML = "";
    if (incorrectAnswers.length === 0) {
        ul.innerHTML = "<li>All answers were correct!</li>";
    } else {
        incorrectAnswers.forEach(item => {
            const li = document.createElement("li");
            li.textContent = `Your input: ${item.userInput} | Correct: ${item.correctAnswer}`;
            ul.appendChild(li);
        });
    }

    document.getElementById("analyticsSection").style.display = "block";
}

// Hide feedback when typing
document.getElementById("userInput").addEventListener("input", function() {
    document.getElementById("result").innerHTML = "";
});

// Keyboard Enter key support using forms
document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault();
    startTraining();
});

document.getElementById("captchaForm").addEventListener("submit", function(e) {
    e.preventDefault();
    checkAnswer();
});
</script>

</body>
</html>
