<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Handwritten CAPTCHA Training</title>

<!-- Handwritten Web Fonts (Google) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Indie+Flower&family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 40px;
    }
    canvas {
        border: 1px solid #ccc;
        margin: 20px;
    }
    input {
        padding: 8px;
        font-size: 16px;
    }
    button {
        padding: 8px 16px;
        margin: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Handwritten CAPTCHA Training (Case-Insensitive)</h2>

<canvas id="captchaCanvas" width="260" height="100"></canvas>

<br>

<input type="text" id="userInput" placeholder="Enter text">
<br>

<button onclick="checkAnswer()">Submit</button>
<button onclick="generateCaptcha()">Next</button>

<p id="result"></p>

<br>

<label>Difficulty:</label>
<input type="range" id="difficulty" min="1" max="5" value="2">

<script>
const fonts = ["Indie Flower", "Patrick Hand", "Caveat"]; // Handwritten style fonts
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"; // Only uppercase + digits
let currentText = "";

// Generate random text
function generateText(length = 5) {
    let text = "";
    for (let i = 0; i < length; i++) {
        text += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return text;
}

// Draw CAPTCHA (handwritten fonts)
function generateCaptcha() {
    const canvas = document.getElementById("captchaCanvas");
    const ctx = canvas.getContext("2d");
    const difficulty = document.getElementById("difficulty").value;

    currentText = generateText();

    // Clear input and feedback
    document.getElementById("userInput").value = "";
    document.getElementById("result").innerHTML = "";

    // Background
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let x = 20;

    for (let i = 0; i < currentText.length; i++) {
        const char = currentText[i];

        ctx.save();

        // Use a random handwritten font
        const fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
        const fontSize = 30 + Math.random() * 15;
        ctx.font = `${fontSize}px "${fontFamily}"`;

        // Random rotation and vertical displacement
        const angle = (Math.random() - 0.5) * difficulty * 0.6;
        const y = 50 + (Math.random() - 0.5) * 10;

        ctx.translate(x, y);
        ctx.rotate(angle);

        ctx.fillStyle = `rgb(${Math.random()*100+50},${Math.random()*100+50},${Math.random()*100+50})`;
        ctx.fillText(char, 0, 0);

        ctx.restore();
        x += fontSize * 0.9;
    }

    // Add random occluding lines for complexity
    for (let i = 0; i < difficulty * 2; i++) {
        ctx.strokeStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.7)`;
        ctx.beginPath();
        ctx.moveTo(Math.random()*260, Math.random()*100);
        ctx.lineTo(Math.random()*260, Math.random()*100);
        ctx.stroke();
    }
}

// Check answer (case-insensitive)
function checkAnswer() {
    const userInput = document.getElementById("userInput").value.toUpperCase(); // Convert input to uppercase
    const result = document.getElementById("result");

    if (userInput === currentText) {
        result.innerHTML = "✅ Correct";
        result.style.color = "green";

        // Auto generate next CAPTCHA after 500ms delay
        setTimeout(generateCaptcha, 500);
    } else {
        result.innerHTML = `❌ Incorrect (Answer: ${currentText})`;
        result.style.color = "red";
    }
}

// Hide feedback when user types
document.getElementById("userInput").addEventListener("input", function() {
    document.getElementById("result").innerHTML = "";
});

// Initialize
generateCaptcha();
</script>

</body>
</html>
